<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Orqut</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #edf3f8
        }

        header {
            background: #bfd6f0;
            padding: 10px 20px;
            display: flex;
            gap: 20px;
            align-items: center
        }

        .logo {
            font-size: 48px;
            color: #ea4c89;
            font-weight: bold
        }

        .menu a {
            background: #8eb2de;
            color: #fff;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 4px;
            margin-right: 6px;
            font-size: 13px
        }

        .container {
            max-width: 1000px;
            margin: 15px auto;
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 15px
        }

        .box {
            background: #fff;
            border: 1px solid #d7d7d7
        }

        .profile,
        .main {
            padding: 15px
        }

        .photo {
            height: 250px;
            border: 1px solid #d7d7d7;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999
        }

        .toolbar {
            border: 1px solid #d7d7d7;
            border-bottom: none;
            padding: 8px
        }

        .editor,
        .input {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #d7d7d7
        }

        .editor {
            height: 180px
        }

        .input {
            padding: 8px;
            margin: 10px 0
        }

        .actions {
            text-align: right;
            margin-top: 10px
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">Orqut</div>
        <nav class="menu">
            <a href="index.html">Início</a>
            <a href="escrever.html">Scraps</a>
            <a href="depoimentos.html">Depoimentos</a>
        </nav>
    </header>
    <div class="container">
        <aside class="box profile">
            <div class="photo">Foto da Bárbara</div>
            <h3>Bárbara</h3>
            <p>Aniversário Anos 2000 ✨</p>
        </aside>
<section class="box main">
    <h3>
        Escrever um depoimento para:
        <span style="background:#eee;padding:3px 6px">BÁRBARA</span>
    </h3>

    <input
        id="nome"
        class="input"
        placeholder="Seu nome"
        maxlength="50">

    <div class="toolbar">
        <b>B</b> <i>I</i> U 😊 🖼️
    </div>

    <textarea
        id="mensagem"
        class="editor"
        maxlength="500"
        placeholder="Escreva uma mensagem especial para a Bárbara..."></textarea>

    <div class="actions">
        <button type="button" id="cancelar">cancelar</button>
        <button type="button" id="enviar">postar</button>
    </div>

    <div id="status"></div>
</section>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js';
    import {
        getFirestore,
        collection,
        addDoc,
        serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js';

    // Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBxgYlu0_t9wcz04mvtJQF-mNsXPEQx58c",
        authDomain: "aniversario-barbara.firebaseapp.com",
        projectId: "aniversario-barbara",
        storageBucket: "aniversario-barbara.firebasestorage.app",
        messagingSenderId: "463937461649",
        appId: "1:463937461649:web:bad385e13d4fc4b9214e30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Elementos da página
    const nomeInput = document.getElementById('nome');
    const mensagemInput = document.getElementById('mensagem');
    const statusDiv = document.getElementById('status');
    const enviarBtn = document.getElementById('enviar');
    const cancelarBtn = document.getElementById('cancelar');

    // Botão cancelar
    cancelarBtn.addEventListener('click', () => {
        nomeInput.value = '';
        mensagemInput.value = '';
        statusDiv.innerHTML = '';
    });

    // Botão postar
    enviarBtn.addEventListener('click', async () => {

        const nome = nomeInput.value.trim();
        const mensagem = mensagemInput.value.trim();

        // Validação
        if (!nome || !mensagem) {
            statusDiv.innerHTML =
                '<span style="color:red">Preencha todos os campos.</span>';
            return;
        }

        // Impede múltiplos cliques
        enviarBtn.disabled = true;
        enviarBtn.textContent = 'postando...';

        try {

            // Salva no Firebase
            await addDoc(collection(db, 'depoimentos'), {
                nome,
                mensagem,
                criadoEm: serverTimestamp()
            });

            // Feedback visual
            statusDiv.innerHTML =
                '<span style="color:green;font-weight:bold;">Depoimento enviado com sucesso! 💕</span>';

            // Limpa os campos
            nomeInput.value = '';
            mensagemInput.value = '';

            // Atualiza botão
            enviarBtn.textContent = 'postado ✓';

            // Volta ao normal após 2 segundos
            setTimeout(() => {
                enviarBtn.disabled = false;
                enviarBtn.textContent = 'postar';
            }, 2000);

        } catch (error) {

            console.error('Erro ao enviar:', error);

            statusDiv.innerHTML =
                '<span style="color:red">Erro ao enviar. Tente novamente.</span>';

            enviarBtn.disabled = false;
            enviarBtn.textContent = 'postar';
        }
    });
</script>
</body>

</html>
